name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: Install and Build
        run: 
          npm run build
        env:
          # Mapează aici toate secretele din imaginea ta GitHub:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_REACT_APP_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_REACT_APP_STRIPE_PUBLISHABLE_KEY }}
          # Dacă le folosești și pe acestea în cod:
          VITE_EMAIL_SEND_KEY: ${{ secrets.VITE_EMAIL_SEND_KEY }}
          VITE_EMAIL_SEND_SERVICE: ${{ secrets.VITE_EMAIL_SEND_SERVICE }}
          VITE_EMAIL_SEND_TEMPLATE: ${{ secrets.VITE_EMAIL_SEND_TEMPLATE }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHAPEHIVE_D43BF }}
          channelId: live
          projectId: shapehive-d43bf